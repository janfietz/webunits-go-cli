version: 2

project_name: webuntis

builds:
  - id: webuntis
    binary: webuntis
    main: ./cmd/webuntis
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/janfietz/webunits-go-cli/pkg/cli.Version={{.Version}}

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: "{{ .Env.GITHUB_REPOSITORY_OWNER }}"
    name: "{{ .ProjectName }}"
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  header: |
    ## Installation

    ### Quick install (Linux/macOS)
    ```bash
    curl -sSfL https://github.com/{{ .Env.GITHUB_REPOSITORY_OWNER }}/webuntis/releases/download/v{{ .Version }}/install.sh | sh
    ```

    ### Download binary
    Download the appropriate archive for your platform from the assets below.
